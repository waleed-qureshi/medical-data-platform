version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: medical-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: medical_data_platform
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  backend:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.backend
    container_name: medical-backend
    environment:
      - PORT=5000
      - JWT_SECRET=supersecret
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=medical_data_platform
      - UPLOAD_DIR=/usr/src/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ../backend:/usr/src/app
      - uploads:/usr/src/app/uploads

volumes:
  db_data:
  uploads:
